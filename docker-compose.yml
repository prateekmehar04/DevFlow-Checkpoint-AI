services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    environment:
      DEVFLOW_DATA_PATH: /app/data/devflow.json
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:3000"]'
    volumes:
      - backend_data:/app/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  backend_data:
